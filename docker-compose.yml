services:
  backend:
    build: ./backend
    container_name: pollen-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: pollen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
